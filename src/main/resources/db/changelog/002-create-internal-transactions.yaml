databaseChangeLog:
  - changeSet:
      id: 002-create-internal-transactions
      author: settlement-team
      changes:
        - createTable:
            tableName: internal_transactions
            columns:
              - column:
                  name: transaction_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: merchant_id
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
