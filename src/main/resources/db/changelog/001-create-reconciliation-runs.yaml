databaseChangeLog:
  - changeSet:
      id: 001-create-reconciliation-runs
      author: settlement-team
      changes:
        - createTable:
            tableName: reconciliation_runs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: reference_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: varchar(512)
                  constraints:
                    nullable: false
